services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
    volumes:
      - db-data:/app/data

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    environment:
      - PORT=8080
      # Stands in for Railway's <service-name>.railway.internal hostname
      - API_UPSTREAM=http://server:3000
    ports:
      - "8080:8080"
    depends_on:
      - server

volumes:
  db-data:
