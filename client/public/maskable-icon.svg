<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full-bleed plum background. Android applies its own circle/squircle mask. -->
  <rect width="512" height="512" fill="#13101f"/>
  <!--
    Safe zone is the centre 80% (≈410px wide circle). Logo is drawn into a
    420×420 box centred at (256,256) so its visible content sits inside that
    safe circle regardless of the device's mask shape.
  -->
  <svg x="46" y="46" width="420" height="420" viewBox="0 0 28 28" fill="none">
    <path d="M14 3 C7 3 3 8 3 14 L25 14 C25 8 21 3 14 3 Z" fill="#a78bfa" opacity="0.42"/>
    <path d="M14 3 L14 14"       stroke="#a78bfa" stroke-width="1" opacity="0.65"/>
    <path d="M9.5 4.5 L11.5 14"  stroke="#a78bfa" stroke-width="1" opacity="0.65"/>
    <path d="M18.5 4.5 L16.5 14" stroke="#a78bfa" stroke-width="1" opacity="0.65"/>
    <path d="M5.5 8.5 L9 14"     stroke="#a78bfa" stroke-width="1" opacity="0.45"/>
    <path d="M22.5 8.5 L19 14"   stroke="#a78bfa" stroke-width="1" opacity="0.45"/>
    <path d="M3 14 C3 21 7.5 25 14 25 C20.5 25 25 21 25 14 Z" fill="#a78bfa" opacity="0.88"/>
    <circle cx="14" cy="17" r="3.5" fill="white" opacity="0.92"/>
    <circle cx="13" cy="16" r="1.2" fill="white" opacity="0.5"/>
  </svg>
</svg>
